version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: tinyscale-redis-compose

  app1:
    build: .
    container_name: tinyscale-app1
    hostname: tinyscale-app1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - BASE_URL=http://localhost
    depends_on:
      - redis

  app2:
    build: .
    container_name: tinyscale-app2
    hostname: tinyscale-app2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - BASE_URL=http://localhost
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: tinyscale-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
